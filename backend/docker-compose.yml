# Production-ish compose for the detection backend.
#
# MediaMTX is an EXTERNAL dependency and is intentionally NOT bundled here. It
# is shown commented-out below purely as a convenience for local development; in
# production it runs as its own managed service. The backend only ever consumes
# the RTSP URL given by STREAM_URL.

services:
  backend:
    build: .
    image: adas-detection-backend:latest
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Default single-camera setup. For multiple cameras set CAMERAS (JSON).
      STREAM_URL: ${STREAM_URL:-rtsp://mediamtx:8554/carcam}
      CAMERA_ID: ${CAMERA_ID:-carcam}
      MODEL: ${MODEL:-yolov8n.pt}
      DETECTION_FPS: ${DETECTION_FPS:-10}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    # Uncomment to run MediaMTX alongside the backend during local dev:
    # depends_on:
    #   - mediamtx

  # --- External dependency, shown for local dev convenience only ---
